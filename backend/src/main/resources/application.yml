server:
  port: 8080

spring:
  application:
    name: windy-chain-intelligence

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:windychain}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

# Blockchain Configuration
blockchain:
  kub:
    rpc-url: ${KUB_RPC_URL:https://rpc.bitkubchain.io}
    ws-url: ${KUB_WS_URL:wss://wss.bitkubchain.io}
    chain-id: 96
    block-time-ms: 5000
  polling:
    interval-ms: ${POLLING_INTERVAL:5000}
    enabled: ${POLLING_ENABLED:true}

# JWT Configuration
security:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-use-at-least-256-bits-key}
    expiration-ms: 86400000

# Whale detection threshold (in KUB)
analytics:
  whale-threshold: ${WHALE_THRESHOLD:100000}
  cache-ttl-seconds: 300

logging:
  level:
    com.windychain: DEBUG
    org.web3j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
